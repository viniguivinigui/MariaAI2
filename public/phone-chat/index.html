<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animacao Celular</title>
    <script type="module" src="./index-CNVUWmqv.js"></script>
    <link rel="stylesheet" href="./index-BeoebGKq.css" />
    <style>
      html, body, #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      #root > div {
        min-height: 100% !important;
        padding: 0 !important;
        background: transparent !important;
        background-image: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      #root > div > div:first-child {
        display: none !important;
      }

      .app-progress-panel {
        display: none !important;
      }

      .app-experience-layout {
        justify-content: center !important;
        width: 100% !important;
        height: 100% !important;
        align-items: center !important;
      }

      .app-phone-shell {
        box-shadow: none !important;
        width: 100% !important;
        max-width: 100% !important;
        height: 100% !important;
        max-height: 100% !important;
        aspect-ratio: 9 / 19.5 !important;
      }

      /* Ajustes finos para evitar clipping na barra inferior */
      .wa-bottom {
        padding-left: 8px !important;
        padding-right: 8px !important;
      }

      .wa-input {
        gap: 8px !important;
      }

      .wa-field {
        min-width: 0 !important;
        padding-right: 8px !important;
      }

      .wa-field input {
        min-width: 0 !important;
      }

      /* Tipografia um pouco menor dentro do celular */
      .wa-statusbar__time {
        font-size: 14px !important;
      }

      .wa-header__back-count {
        font-size: 15px !important;
      }

      .wa-header__name {
        font-size: 14px !important;
        line-height: 16px !important;
      }

      .wa-header__presence {
        font-size: 11px !important;
        line-height: 13px !important;
      }

      .wa-header__avatar {
        display: none !important;
      }

      .wa-statusbar__right svg:first-child {
        display: none !important;
      }

      .wa-text {
        font-size: 13px !important;
        line-height: 17px !important;
      }

      .wa-meta {
        font-size: 10px !important;
      }

      .wa-field input {
        font-size: 13px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
